[workspace]
# cargo-dist only builds the user-facing Rebecca package. crates.io publishing is
# handled by .github/workflows/release-crates.yml in workspace dependency order.
members = ["cargo:crates/rebecca"]

[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = ["powershell"]
targets = ["x86_64-pc-windows-msvc"]
pr-run-mode = "plan"
install-path = "CARGO_HOME"
install-updater = false
hosting = "github"

[dist.github-custom-runners]
global = "ubuntu-24.04"
x86_64-pc-windows-msvc = "windows-2025"
