name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  skills:
    name: Skills validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python: python3
          - os: windows-2025
            python: python

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Codex skills
        run: ${{ matrix.python }} skills/validate.py

  rust:
    name: Rust quality gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-24.04
          - macos-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt,clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Show Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run dependency policy checks
        run: cargo deny check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --locked

      - name: Validate built-in catalogs
        run: cargo run -p rebecca --locked -- catalog validate --format json

      - name: Run Linux cleanup smoke
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/ci/run-linux-cleanup-smoke.sh

      - name: Run macOS cleanup smoke
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/ci/run-macos-cleanup-smoke.sh

  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Plan release
        shell: bash
        run: |
          dist plan --output-format=json > plan-dist-manifest.json
          cat plan-dist-manifest.json

      - name: Upload dist plan
        uses: actions/upload-artifact@v7
        with:
          name: dist-plan-manifest
          path: plan-dist-manifest.json

  release-smoke:
    name: Release packaging smoke
    needs: rust
    runs-on: windows-2025
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Show Rust toolchain
        run: rustup show

      - name: Build release archive
        shell: pwsh
        run: ./scripts/release/build-release.ps1 -Tag "" -Repository "${{ github.repository }}" -OutDir "target/release-smoke"

      - name: Generate SBOM
        shell: pwsh
        run: ./scripts/release/write-sbom.ps1 -Tag "" -Repository "${{ github.repository }}" -DistDir "target/release-smoke"

      - name: Generate checksums
        shell: pwsh
        run: ./scripts/release/write-checksums.ps1 -DistDir "target/release-smoke"

      - name: Smoke install from release archive
        shell: pwsh
        run: |
          $asset = Get-ChildItem -LiteralPath "target/release-smoke" -Filter "rebecca-*-windows-x86_64-msvc.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find the release archive."
          }

          ./scripts/install.ps1 -AssetPath $asset.FullName -ChecksumsPath "target/release-smoke/SHA256SUMS" -InstallDir "target/install-smoke" -SkipAttestation
