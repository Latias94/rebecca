name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string
      source_ref:
        description: "Git ref to validate"
        required: true
        default: "main"
        type: string

concurrency:
  group: release-preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Release readiness
    runs-on: windows-2025
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt,clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Show Rust toolchain
        run: rustup show

      - name: Test crates.io publish plan resolver
        shell: pwsh
        run: pwsh -File scripts/release/resolve-publish-plan.ps1 -SelfTest

      - name: Test crate package verifier
        shell: pwsh
        run: pwsh -File scripts/release/verify-package-plan.ps1 -SelfTest

      - name: Resolve crates.io publish plan
        shell: pwsh
        run: pwsh -File scripts/release/resolve-publish-plan.ps1 -Version "${{ inputs.version }}" -OutputPath "target/release-preflight/publish-plan.json" -MarkdownPath "target/release-preflight/publish-plan-summary.md"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run dependency policy checks
        run: cargo deny check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --locked

      - name: Validate built-in catalogs
        run: cargo run -p rebecca --locked -- catalog validate --format json

      - name: Validate packaged skills
        run: python skills/validate.py

      - name: Verify crate package plan
        shell: pwsh
        run: pwsh -File scripts/release/verify-package-plan.ps1 -Version "${{ inputs.version }}" -PublishPlanPath "target/release-preflight/publish-plan.json" -PackageListDir "target/package-lists" -EvidencePath "target/release-preflight/package-verification.json"

      - name: Build release archive
        shell: pwsh
        run: ./scripts/release/build-release.ps1 -Tag "v${{ inputs.version }}" -Repository "${{ github.repository }}" -OutDir "target/release-preflight"

      - name: Generate SBOM
        shell: pwsh
        run: ./scripts/release/write-sbom.ps1 -Tag "v${{ inputs.version }}" -Repository "${{ github.repository }}" -DistDir "target/release-preflight"

      - name: Generate checksums
        shell: pwsh
        run: ./scripts/release/write-checksums.ps1 -DistDir "target/release-preflight"

      - name: Smoke install from release archive
        shell: pwsh
        run: |
          $asset = Get-ChildItem -LiteralPath "target/release-preflight" -Filter "rebecca-*-windows-x86_64-msvc.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find the release archive."
          }

          ./scripts/install.ps1 -AssetPath $asset.FullName -ChecksumsPath "target/release-preflight/SHA256SUMS" -InstallDir "target/install-preflight" -SkipAttestation
          $completion = Join-Path "target/install-preflight/completions" "rebecca.ps1"
          if (-not (Test-Path -LiteralPath $completion -PathType Leaf)) {
            throw "Installed release archive did not include PowerShell completion: $completion"
          }
          if (-not (Select-String -LiteralPath $completion -Pattern "completion" -Quiet)) {
            throw "Installed PowerShell completion did not include Rebecca commands."
          }

      - name: Upload package lists
        uses: actions/upload-artifact@v7
        with:
          name: crate-package-lists
          path: |
            target/package-lists/*.txt
            target/release-preflight/package-verification.json
            target/release-preflight/publish-plan.json
            target/release-preflight/publish-plan-summary.md

  macos-cleanup-smoke:
    name: macOS cleanup smoke
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Run macOS cleanup smoke
        run: bash scripts/ci/run-macos-cleanup-smoke.sh
