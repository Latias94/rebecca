name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string
      source_ref:
        description: "Git ref to validate"
        required: true
        default: "main"
        type: string

concurrency:
  group: release-preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Release readiness
    runs-on: windows-2025
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt,clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Show Rust toolchain
        run: rustup show

      - name: Verify workspace version
        shell: pwsh
        run: |
          $match = Select-String -LiteralPath Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            throw "Could not read workspace version from Cargo.toml"
          }

          $workspaceVersion = $match.Matches[0].Groups[1].Value
          if ($workspaceVersion -ne "${{ inputs.version }}") {
            throw "Cargo workspace version '$workspaceVersion' does not match release version '${{ inputs.version }}'."
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run dependency policy checks
        run: cargo deny check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --locked

      - name: Validate built-in catalogs
        run: cargo run -p rebecca --locked -- catalog validate --format json

      - name: Build package file lists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "target/package-lists" | Out-Null
          foreach ($crate in @("rebecca-safety", "rebecca-ntfs", "rebecca-core", "rebecca-rules", "rebecca-windows", "rebecca")) {
            cargo package -p $crate --list > "target/package-lists/$crate.txt"
          }

      - name: Verify crates.io publish dependency order
        shell: pwsh
        run: |
          $publishOrder = @("rebecca-safety", "rebecca-ntfs", "rebecca-core", "rebecca-rules", "rebecca-windows", "rebecca")
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $workspaceMemberIds = @{}
          foreach ($memberId in $metadata.workspace_members) {
            $workspaceMemberIds[[string]$memberId] = $true
          }

          $workspacePackages = @{}
          foreach ($package in $metadata.packages) {
            if ($workspaceMemberIds.ContainsKey([string]$package.id)) {
              $workspacePackages[[string]$package.name] = $package
            }
          }

          $orderByName = @{}
          for ($index = 0; $index -lt $publishOrder.Count; $index++) {
            $crate = $publishOrder[$index]
            if (-not $workspacePackages.ContainsKey($crate)) {
              throw "Publish order references workspace crate '$crate', but cargo metadata did not find it."
            }

            $crateVersion = [string]$workspacePackages[$crate].version
            if ($crateVersion -ne "${{ inputs.version }}") {
              throw "$crate version '$crateVersion' does not match release version '${{ inputs.version }}'."
            }

            $orderByName[$crate] = $index
          }

          foreach ($crate in $workspacePackages.Keys) {
            if (-not $orderByName.ContainsKey($crate)) {
              throw "Workspace crate '$crate' is missing from the crates.io publish order."
            }
          }

          $violations = [System.Collections.Generic.List[string]]::new()
          foreach ($crate in $publishOrder) {
            $package = $workspacePackages[$crate]
            foreach ($dependency in $package.dependencies) {
              $dependencyName = [string]$dependency.name
              if (-not $orderByName.ContainsKey($dependencyName)) {
                continue
              }

              if ($orderByName[$dependencyName] -ge $orderByName[$crate]) {
                $dependencyKind = if ($null -eq $dependency.kind) { "normal" } else { [string]$dependency.kind }
                $violations.Add("$crate has a $dependencyKind workspace dependency on $dependencyName, but $dependencyName is not published earlier.")
              }
            }
          }

          if ($violations.Count -gt 0) {
            $message = "Invalid crates.io publish order:`n" + ($violations -join "`n")
            throw $message
          }

      - name: Verify registry-independent crate dry-runs
        shell: pwsh
        run: |
          function Test-CrateVersionPublished {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Crate,
              [Parameter(Mandatory = $true)]
              [string]$Version
            )

            cargo info "$Crate@$Version" --registry crates-io *> $null
            return $LASTEXITCODE -eq 0
          }

          foreach ($crate in @("rebecca-safety", "rebecca-ntfs")) {
            if (Test-CrateVersionPublished -Crate $crate -Version "${{ inputs.version }}") {
              Write-Host "Skipping dry-run for $crate ${{ inputs.version }} because it is already published."
              continue
            }

            cargo publish -p $crate --locked --dry-run --registry crates-io
          }

      - name: Build release archive
        shell: pwsh
        run: ./scripts/release/build-release.ps1 -Tag "v${{ inputs.version }}" -Repository "${{ github.repository }}" -OutDir "target/release-preflight"

      - name: Generate SBOM
        shell: pwsh
        run: ./scripts/release/write-sbom.ps1 -Tag "v${{ inputs.version }}" -Repository "${{ github.repository }}" -DistDir "target/release-preflight"

      - name: Generate checksums
        shell: pwsh
        run: ./scripts/release/write-checksums.ps1 -DistDir "target/release-preflight"

      - name: Smoke install from release archive
        shell: pwsh
        run: |
          $asset = Get-ChildItem -LiteralPath "target/release-preflight" -Filter "rebecca-*-windows-x86_64-msvc.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find the release archive."
          }

          ./scripts/install.ps1 -AssetPath $asset.FullName -ChecksumsPath "target/release-preflight/SHA256SUMS" -InstallDir "target/install-preflight" -SkipAttestation
          $completion = Join-Path "target/install-preflight/completions" "rebecca.ps1"
          if (-not (Test-Path -LiteralPath $completion -PathType Leaf)) {
            throw "Installed release archive did not include PowerShell completion: $completion"
          }
          if (-not (Select-String -LiteralPath $completion -Pattern "completion" -Quiet)) {
            throw "Installed PowerShell completion did not include Rebecca commands."
          }

      - name: Upload package lists
        uses: actions/upload-artifact@v7
        with:
          name: crate-package-lists
          path: target/package-lists/*.txt

  macos-cleanup-smoke:
    name: macOS cleanup smoke
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Run macOS cleanup smoke
        run: bash scripts/ci/run-macos-cleanup-smoke.sh
