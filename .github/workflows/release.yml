name: Release

on:
  push:
    tags:
      - "v*"
      - "V*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build Windows artifact
    runs-on: windows-2025
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt,clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Show Rust toolchain
        run: rustup show

      - name: Verify release tag matches workspace version
        shell: pwsh
        run: |
          $match = Select-String -LiteralPath Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            throw "Could not read workspace version from Cargo.toml"
          }

          $workspaceVersion = $match.Matches[0].Groups[1].Value
          $tag = "${{ github.ref_name }}"

          if ($tag -match '^[vV](\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$') {
            $tagVersion = $Matches[1]
          }
          else {
            throw "Release tag '$tag' must look like vX.Y.Z."
          }

          if ($tagVersion -ne $workspaceVersion) {
            throw "Release tag version '$tagVersion' does not match workspace version '$workspaceVersion'."
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --locked

      - name: Build release package
        shell: pwsh
        run: >
          ./scripts/release/build-release.ps1
          -Tag "${{ github.ref_name }}"
          -Repository "${{ github.repository }}"
          -Target "x86_64-pc-windows-msvc"
          -OutDir "dist"

      - name: Generate SBOM
        shell: pwsh
        run: ./scripts/release/write-sbom.ps1 -Tag "${{ github.ref_name }}" -Repository "${{ github.repository }}" -DistDir "dist"

      - name: Generate checksums
        shell: pwsh
        run: ./scripts/release/write-checksums.ps1 -DistDir "dist"

      - name: Smoke install from release package
        shell: pwsh
        run: |
          $asset = Get-ChildItem -LiteralPath "dist" -Filter "rebecca-*-windows-x86_64-msvc.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find the release archive."
          }

          ./scripts/install.ps1 -AssetPath $asset.FullName -ChecksumsPath "dist/SHA256SUMS" -InstallDir "target/release-install-smoke" -SkipAttestation

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/*.spdx
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      attestations: write
      id-token: write
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print -exec sha256sum {} \;

      - name: Generate build provenance attestations
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          prerelease_flag=""
          if [[ "$tag" =~ ^[vV]?[0-9]+\.[0-9]+\.[0-9]+[-+][0-9A-Za-z.-]+$ ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" release-assets/* --title "$tag" --generate-notes --verify-tag $prerelease_flag
