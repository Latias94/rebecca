manifest_version = 1
id = "windows.steam-install-stats-cache"
platform = "windows"
category = "application"
name = "Steam install stats cache"
safety_level = "safe"
restore_hint = "Steam stats and achievement cache data will be rebuilt on launch."
warnings = ["source-boundary"]

[[targets]]
kind = "steam-install-template"
value = "appcache\\stats"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam install root appcache\\stats folder, which stores disposable local stats and achievement cache data. The rule targets only the stats cache and intentionally avoids userdata, steamapps, and broader appcache metadata."
