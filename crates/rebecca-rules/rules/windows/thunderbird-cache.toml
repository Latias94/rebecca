manifest_version = 1
id = "windows.thunderbird-cache"
platform = "windows"
category = "application"
name = "Thunderbird cache"
safety_level = "safe"
restore_hint = "Thunderbird profile caches will be regenerated."
warnings = ["active-process"]

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Thunderbird\\Profiles\\*\\cache2"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Thunderbird\\Profiles\\*\\startupCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit thunderbird cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets only local profile cache leaves and intentionally excludes mail stores, message indexes, cookies, passwords, session restore, profile configuration, and SQLite vacuum actions."
