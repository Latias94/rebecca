manifest_version = 1
id = "windows.thunderbird-cache"
platform = "windows"
category = "application"
name = "Thunderbird cache"
safety_level = "safe"
restore_hint = "Thunderbird profile caches will be regenerated."
warnings = ["active-process"]

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Thunderbird\\Profiles\\*\\cache2"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Thunderbird\\Profiles\\*\\startupCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from BleachBit (cleaners/thunderbird.xml, GPL-3.0-or-later, fb0f67c560460c8018b04fa3746a0b6f7a315726). Rewritten for Rebecca to target only local profile cache leaves and intentionally exclude mail stores, message indexes, cookies, passwords, session restore, profile configuration, and SQLite vacuum actions."
