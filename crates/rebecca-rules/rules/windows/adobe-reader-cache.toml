manifest_version = 1
id = "windows.adobe-reader-cache"
platform = "windows"
category = "application"
name = "Adobe Reader cache"
safety_level = "safe"
restore_hint = "Adobe Reader cache files will be regenerated."
warnings = ["active-process"]

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Adobe\\Acrobat\\*\\Cache"

[[targets]]
kind = "glob-template"
value = "%USERPROFILE%\\AppData\\LocalLow\\Adobe\\Acrobat\\9.0\\Search\\*.idx"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from BleachBit (cleaners/adobe_reader.xml, GPL-3.0-or-later, fb0f67c560460c8018b04fa3746a0b6f7a315726). Rewritten for Rebecca to target only local Acrobat cache/search-index files and intentionally exclude MRU registry entries, document history, preferences, and document files."
