manifest_version = 1
id = "windows.chrome-cache"
platform = "windows"
category = "browser"
name = "Google Chrome cache"
safety_level = "safe"
restore_hint = "Browser cache that can be regenerated."

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Cache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Code Cache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\GPUCache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\DawnCache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Media Cache"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Cache"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Code Cache"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\GPUCache"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\DawnCache"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Media Cache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\component_crx_cache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\extensions_crx_cache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\GraphiteDawnCache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\GrShaderCache"

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\ShaderCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit google_chrome cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets only regenerable Chromium-family cache directories and intentionally excludes Network state, Safe Browsing journals, Preferences JSON edits, cookies, history, sync, passwords, Local Storage, IndexedDB, Service Worker, sessions, and profile databases."
