manifest_version = 1
id = "windows.teamviewer-logs"
platform = "windows"
category = "application"
name = "TeamViewer logs"
safety_level = "safe"
restore_hint = "TeamViewer log files will be recreated when needed."
warnings = ["active-process"]

[[targets]]
kind = "glob-template"
value = "%APPDATA%\\TeamViewer\\TeamViewer*_Logfile.log"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from BleachBit TeamViewer cleaner behavior (repo-ref/bleachbit/cleaners/teamviewer.xml, GPL-3.0-or-later, fb0f67c560460c8018b04fa3746a0b6f7a315726). Rewritten for Rebecca as a log-file-only rule; MRU files, connection history, registry values, configuration, and account state are excluded."
