manifest_version = 1
id = "windows.steam-install-logs"
platform = "windows"
category = "application"
name = "Steam install logs"
safety_level = "safe"
restore_hint = "Steam logs will be recreated when Steam runs again."
warnings = ["source-boundary"]

[[targets]]
kind = "steam-install-template"
value = "logs"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on Valve's Steamworks debugging documentation, which describes Steam writing debug output under %Steam Install%\\logs. The rule targets only the disposable logs directory and intentionally avoids userdata, steamapps, and game content."
