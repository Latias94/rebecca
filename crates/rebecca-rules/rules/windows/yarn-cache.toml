id = "windows.yarn-cache"
platform = "windows"
category = "development"
name = "Yarn cache"
safety_level = "moderate"
restore_hint = "Yarn may need to redownload packages into its cache."

[[targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Yarn\\Cache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets Yarn's default Windows cache under Local AppData and intentionally avoids project .yarn directories."
