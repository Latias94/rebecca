manifest_version = 1
id = "windows.system-temp"
platform = "windows"
category = "system"
name = "Windows temp files"
safety_level = "moderate"
restore_hint = "Windows temporary files will be recreated as needed."

[[targets]]
kind = "template"
value = "%WINDIR%\\Temp"

