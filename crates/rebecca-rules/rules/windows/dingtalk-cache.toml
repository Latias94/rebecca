manifest_version = 1
id = "windows.dingtalk-cache"
platform = "windows"
category = "application"
name = "DingTalk cache"
safety_level = "safe"
restore_hint = "DingTalk caches will be rebuilt on launch."

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\DingTalk*\\Cache"

[[targets]]
kind = "template"
value = "%APPDATA%\\DingTalk\\Cache"

[[targets]]
kind = "glob-template"
value = "%APPDATA%\\DingTalk\\*\\resource_cache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from Mole's DingTalk cache behavior reference and public Windows DingTalk cache-path observations. Rewritten for Rebecca; cache leaves only and intentionally avoids account data, sync data, logs, document data, and session data."
