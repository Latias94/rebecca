manifest_version = 1
id = "windows.thumbnail-cache"
platform = "windows"
category = "system"
name = "Windows thumbnail and icon cache"
safety_level = "safe"
restore_hint = "Windows thumbnail and icon caches will be regenerated."

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Microsoft\\Windows\\Explorer\\thumbcache_*.db"

[[targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Microsoft\\Windows\\Explorer\\iconcache_*.db"

[provenance]
source = "owned"
license = "project-owned"
notes = "Initial owned catalog based on common Windows cache conventions."
