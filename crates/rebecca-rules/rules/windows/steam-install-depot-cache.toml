manifest_version = 1
id = "windows.steam-install-depot-cache"
platform = "windows"
category = "application"
name = "Steam install depot cache"
safety_level = "safe"
restore_hint = "Steam depot cache will be rebuilt when Steam runs again."

[[targets]]
kind = "steam-install-template"
value = "depotcache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on Valve's Steamworks documentation, which tells users to delete appcache and depotcache in the Steam install folder when troubleshooting downloads. The rule targets only the disposable depotcache directory and intentionally avoids userdata, steamapps, and game content."
