id = "windows.steam-install-packageinfo-cache"
platform = "windows"
category = "application"
name = "Steam install package info cache"
safety_level = "safe"
delete_policy = "recycle-bin"
restore_hint = "Steam package metadata will be rebuilt on launch."

[[targets]]
kind = "steam-install-template"
value = "appcache\\packageinfo.vdf"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam install root appcache\\packageinfo.vdf metadata file, which is regenerated by Steam. The rule targets only the package info cache file and intentionally avoids userdata, steamapps, and broader appcache state."
