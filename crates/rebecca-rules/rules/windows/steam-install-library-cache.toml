id = "windows.steam-install-library-cache"
platform = "windows"
category = "application"
name = "Steam install library cache"
safety_level = "safe"
delete_policy = "recycle-bin"
restore_hint = "Steam library artwork and metadata will be rebuilt on launch."

[[targets]]
kind = "steam-install-template"
value = "appcache\\librarycache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam install root appcache\\librarycache folder. The rule targets only disposable library artwork and metadata caches and intentionally avoids user data, downloads, and app library content."
