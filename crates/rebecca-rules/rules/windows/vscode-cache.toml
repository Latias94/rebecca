id = "windows.vscode-cache"
platform = "windows"
category = "development"
name = "Visual Studio Code cache"
safety_level = "moderate"
delete_policy = "recycle-bin"
restore_hint = "Editor caches will be rebuilt on launch."

[[targets]]
kind = "template"
value = "%APPDATA%\\Code\\Cache"

[[targets]]
kind = "template"
value = "%APPDATA%\\Code\\Code Cache"

[[targets]]
kind = "template"
value = "%APPDATA%\\Code\\GPUCache"

[[targets]]
kind = "template"
value = "%APPDATA%\\Code\\CachedData"

[provenance]
source = "owned"
license = "project-owned"
notes = "Initial owned catalog based on common Windows cache conventions."
