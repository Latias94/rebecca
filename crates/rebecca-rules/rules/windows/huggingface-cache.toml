manifest_version = 1
id = "windows.huggingface-cache"
platform = "windows"
category = "development"
name = "Hugging Face cache"
safety_level = "moderate"
restore_hint = "Hugging Face caches may need to be re-downloaded."

[[targets]]
kind = "template"
value = "%HF_HUB_CACHE%"

[[targets]]
kind = "template"
value = "%HF_DATASETS_CACHE%"

[[targets]]
kind = "template"
value = "%HF_ASSETS_CACHE%"

[[targets]]
kind = "template"
value = "%HF_XET_CACHE%"

[[targets]]
kind = "template"
value = "%HUGGINGFACE_HUB_CACHE%"

[[targets]]
kind = "template"
value = "%HUGGINGFACE_ASSETS_CACHE%"

[[targets]]
kind = "template"
value = "%HF_HOME%\\hub"

[[targets]]
kind = "template"
value = "%HF_HOME%\\datasets"

[[targets]]
kind = "template"
value = "%HF_HOME%\\assets"

[[targets]]
kind = "template"
value = "%HF_HOME%\\xet"

[[targets]]
kind = "template"
value = "%USERPROFILE%\\.cache\\huggingface\\hub"

[[targets]]
kind = "template"
value = "%USERPROFILE%\\.cache\\huggingface\\datasets"

[[targets]]
kind = "template"
value = "%USERPROFILE%\\.cache\\huggingface\\assets"

[[targets]]
kind = "template"
value = "%USERPROFILE%\\.cache\\huggingface\\xet"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from null-e (repo-ref/null-e, WTFPL-2.0, 079a038f71159dab07c4d2bd8bd700cb5647972d) and verified against Hugging Face Hub environment-variable docs plus Hugging Face Datasets cache docs. Targets the documented cache subdirectories only; rewritten for Rebecca."
