manifest_version = 1
id = "windows.vlc-cache"
platform = "windows"
category = "application"
name = "VLC media cache"
safety_level = "safe"
restore_hint = "VLC artwork cache and crash diagnostics will be recreated when needed."
warnings = ["active-process"]

[[targets]]
kind = "template"
value = "%APPDATA%\\vlc\\art\\artistalbum"

[[targets]]
kind = "template"
value = "%APPDATA%\\vlc\\crashdump"

[provenance]
source = "owned"
license = "project-owned"
notes = "Derived from BleachBit VLC cleaner behavior (repo-ref/bleachbit/cleaners/vlc.xml, GPL-3.0-or-later, fb0f67c560460c8018b04fa3746a0b6f7a315726). Rewritten for Rebecca as a cache-and-diagnostics rule; VLC MRU fields, playlist history, media files, and configuration are excluded."
