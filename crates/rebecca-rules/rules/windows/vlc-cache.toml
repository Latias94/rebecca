manifest_version = 1
id = "windows.vlc-cache"
platform = "windows"
category = "application"
name = "VLC media cache"
safety_level = "safe"
restore_hint = "VLC artwork cache and crash diagnostics will be recreated when needed."
warnings = ["active-process"]

[[targets]]
kind = "template"
value = "%APPDATA%\\vlc\\art\\artistalbum"

[[targets]]
kind = "template"
value = "%APPDATA%\\vlc\\crashdump"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit VLC cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets VLC artwork cache and crash diagnostic leaves only; VLC MRU fields, playlist history, media files, and configuration are excluded."
