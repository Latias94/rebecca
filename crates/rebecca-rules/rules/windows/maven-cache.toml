id = "windows.maven-cache"
platform = "windows"
category = "development"
name = "Maven local repository"
safety_level = "moderate"
restore_hint = "Maven may need to redownload artifacts into the local repository."

[[targets]]
kind = "template"
value = "%USERPROFILE%\\.m2\\repository"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets Maven's user-scoped local repository only and intentionally avoids settings, credentials, and project build output."
