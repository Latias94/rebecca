manifest_version = 1
id = "windows.wxwork-cache"
platform = "windows"
category = "application"
name = "Enterprise WeChat cache"
safety_level = "safe"
restore_hint = "Enterprise WeChat caches will be rebuilt on launch."
warnings = ["broad-discovery"]

[[targets]]
kind = "glob-template"
value = "%APPDATA%\\Tencent\\WXWork\\Data\\*\\Cache\\File\\*\\MEMORY.DMP"

[[targets]]
kind = "glob-template"
value = "%APPDATA%\\Tencent\\WXWork\\Data\\*\\Cache\\Image\\*\\WXWorkCapture_*.jpg"

[provenance]
source = "owned"
license = "project-owned"
notes = "Uses Winapp2 Tencent WeChat Work entry as discovery index only, no rule data copied, plus independent Windows WXWork cache-path observations. Specific cache artifacts only; intentionally avoids logs, account data, document data, and session data."
