manifest_version = 1
id = "steam-install-localization-cache"
category = "application"
name = "Steam install localization cache"
safety_level = "safe"
restore_hint = "Steam localization metadata will be rebuilt on launch."
warnings = ["source-boundary"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "steam-install-template"
value = "appcache\\localization.vdf"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam install root appcache\\localization.vdf metadata file, which is regenerated by Steam. The rule targets only the localization cache file and intentionally avoids userdata, steamapps, and broader appcache state."
