manifest_version = 1
id = "chromium-cache"
category = "browser"
name = "Chromium cache"
safety_level = "safe"
restore_hint = "Chromium browser caches will be regenerated."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Default\\Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Default\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Default\\GPUCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Default\\DawnCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Default\\Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Profile *\\Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Profile *\\Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Profile *\\GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Profile *\\DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\Profile *\\Media Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\component_crx_cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\extensions_crx_cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\GraphiteDawnCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\GrShaderCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Chromium\\User Data\\ShaderCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/Default/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/Default/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/Default/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/Default/DawnCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/Default/Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/chromium/Profile */Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/chromium/Profile */Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/chromium/Profile */GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/chromium/Profile */DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/chromium/Profile */Media Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/ShaderCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/chromium/GrShaderCache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Default/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Default/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Default/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Default/DawnCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Default/Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Profile */Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Profile */Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Profile */GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Profile */DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/Profile */Media Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/ShaderCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Chromium/GrShaderCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit chromium cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets only regenerable Chromium-family cache directories and intentionally excludes Network state, Safe Browsing journals, Preferences JSON edits, cookies, history, sync, passwords, Local Storage, IndexedDB, Service Worker, sessions, and profile databases."
