manifest_version = 1
id = "steam-install-appinfo-cache"
category = "application"
name = "Steam install appinfo cache"
safety_level = "safe"
restore_hint = "Steam app metadata will be rebuilt on launch."
warnings = ["source-boundary"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "steam-install-template"
value = "appcache\\appinfo.vdf"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam install root appcache\\appinfo.vdf cache file, which stores disposable application metadata. The rule targets only the cache file and intentionally avoids userdata, steamapps, and broader appcache metadata."
