manifest_version = 1
id = "baidunetdisk-cache"
category = "application"
name = "Baidu Netdisk cache"
safety_level = "safe"
restore_hint = "Baidu Netdisk cache files will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Baidu\\BaiduNetdisk\\cache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on independent public Windows Baidu Netdisk cache-path observations. Cache leaf only; intentionally avoids sync state, account data, document content, and transfer databases."
