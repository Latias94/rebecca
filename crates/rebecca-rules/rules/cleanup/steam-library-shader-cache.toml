manifest_version = 1
id = "steam-library-shader-cache"
category = "application"
name = "Steam library shader cache"
safety_level = "safe"
restore_hint = "Steam shader caches will be rebuilt by Steam and games."
warnings = ["source-boundary"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "steam-library-template"
value = "steamapps\\shadercache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam library layout next to common game installs. The rule targets only the shader cache directory and intentionally avoids common game content, downloads, workshop data, and account metadata."
