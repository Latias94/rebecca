manifest_version = 1
id = "figma-cache"
category = "application"
name = "Figma cache"
safety_level = "safe"
restore_hint = "Figma caches will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Figma\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Figma\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Figma\\GPUCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Figma/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Figma/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Figma/GPUCache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Figma/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Figma/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Figma/GPUCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on Figma's Windows Roaming app data layout and common Electron cache directory conventions, with null-e's Electron app list used as behavior-only reference. The rule targets cache subdirectories only and intentionally avoids Local Storage, IndexedDB, Service Worker, cookies, settings, workspace data, and session data."
