manifest_version = 1
id = "thumbnail-cache"
category = "system"
name = "Thumbnail and icon cache"
safety_level = "safe"
restore_hint = "Thumbnail and icon caches will be regenerated."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Microsoft\\Windows\\Explorer\\thumbcache_*.db"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Microsoft\\Windows\\Explorer\\iconcache_*.db"

[[platforms]]
platform = "linux"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/thumbnails/normal"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/thumbnails/large"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/thumbnails/x-large"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/thumbnails/fail"

[[platforms]]
platform = "macos"

[[platforms.targets]]
kind = "template"
value = "%MACOS_CACHE_HOME%/com.apple.QuickLook.thumbnailcache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets rebuildable OS thumbnail/icon cache leaves only; durable image libraries, Photos data, Finder settings, and application state are excluded."
