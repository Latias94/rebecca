manifest_version = 1
id = "npm-cache"
category = "development"
name = "npm cache"
safety_level = "moderate"
restore_hint = "Package manager cache; packages may need to be downloaded again."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\npm-cache\\_cacache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\npm-cache\\_cacache"

[[platforms]]
platform = "linux"

[[platforms.targets]]
kind = "template"
value = "%HOME%/.npm/_cacache"

[[platforms]]
platform = "macos"

[[platforms.targets]]
kind = "template"
value = "%HOME%/.npm/_cacache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets npm's Windows content-addressable cache under the Local AppData default and keeps the older Roaming AppData location as a compatibility fallback."
