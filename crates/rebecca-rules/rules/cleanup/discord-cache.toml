manifest_version = 1
id = "discord-cache"
category = "application"
name = "Discord cache"
safety_level = "safe"
restore_hint = "Discord caches will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discord\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discord\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discord\\GPUCache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordptb\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordptb\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordptb\\GPUCache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordcanary\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordcanary\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\discordcanary\\GPUCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discord/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discord/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discord/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordptb/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordptb/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordptb/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordcanary/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordcanary/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/discordcanary/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%HOME%/.var/app/com.discordapp.Discord/cache"

[[platforms.targets]]
kind = "template"
value = "%HOME%/snap/discord/common/.cache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discord/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discord/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discord/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordptb/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordptb/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordptb/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordcanary/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordcanary/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/discordcanary/GPUCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on Discord's Windows Roaming app data layout and common Electron cache directory conventions. The rule targets cache subdirectories only and intentionally avoids Local Storage, IndexedDB, settings, and session data."
