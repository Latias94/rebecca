manifest_version = 1
id = "teamviewer-logs"
category = "application"
name = "TeamViewer logs"
safety_level = "safe"
restore_hint = "TeamViewer log files will be recreated when needed."
warnings = ["active-process"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "glob-template"
value = "%APPDATA%\\TeamViewer\\TeamViewer*_Logfile.log"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit TeamViewer cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets TeamViewer log files only; MRU files, connection history, registry values, configuration, and account state are excluded."
