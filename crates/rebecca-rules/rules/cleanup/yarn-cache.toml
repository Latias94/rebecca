manifest_version = 1
id = "yarn-cache"
category = "development"
name = "Yarn cache"
safety_level = "moderate"
restore_hint = "Yarn may need to redownload packages into its cache."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Yarn\\Cache"

[[platforms]]
platform = "linux"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/yarn"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets Yarn's default Windows cache under Local AppData and intentionally avoids project .yarn directories."
