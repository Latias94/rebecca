manifest_version = 1
id = "chrome-cache"
category = "browser"
name = "Google Chrome cache"
safety_level = "safe"
restore_hint = "Browser cache that can be regenerated."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\GPUCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\DawnCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Profile *\\Media Cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\component_crx_cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\extensions_crx_cache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\GraphiteDawnCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\GrShaderCache"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\Google\\Chrome\\User Data\\ShaderCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/Default/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/Default/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/Default/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/Default/DawnCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/Default/Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/google-chrome/Profile */Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/google-chrome/Profile */Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/google-chrome/Profile */GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/google-chrome/Profile */DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/google-chrome/Profile */Media Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/ShaderCache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/google-chrome/GrShaderCache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Default/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Default/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Default/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Default/DawnCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Default/Media Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Profile */Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Profile */Code Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Profile */GPUCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Profile */DawnCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/Profile */Media Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/ShaderCache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Google/Chrome/GrShaderCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit google_chrome cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets only regenerable Chromium-family cache directories and intentionally excludes Network state, Safe Browsing journals, Preferences JSON edits, cookies, history, sync, passwords, Local Storage, IndexedDB, Service Worker, sessions, and profile databases."
