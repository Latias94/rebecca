manifest_version = 1
id = "tencent-meeting-cache"
category = "application"
name = "Tencent Meeting cache"
safety_level = "safe"
restore_hint = "Tencent Meeting caches will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Tencent\\Meeting\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Tencent\\WeMeet\\Global\\Data\\DynamicResourcePackage"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Tencent\\WeMeet\\Global\\Data\\DynamicResource"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on independent public Windows Tencent Meeting and WeMeet cache-path observations. Cache leaves only; intentionally avoids meeting history, account data, recordings, and session data."
