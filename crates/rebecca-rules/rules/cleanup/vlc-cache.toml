manifest_version = 1
id = "vlc-cache"
category = "application"
name = "VLC media cache"
safety_level = "safe"
restore_hint = "VLC artwork cache and crash diagnostics will be recreated when needed."
warnings = ["active-process"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\vlc\\art\\artistalbum"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\vlc\\crashdump"

[[platforms]]
platform = "linux"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/vlc/art/artistalbum"

[[platforms.targets]]
kind = "template"
value = "%XDG_CACHE_HOME%/vlc/crashdump"

[[platforms]]
platform = "macos"

[[platforms.targets]]
kind = "template"
value = "%MACOS_CACHE_HOME%/org.videolan.vlc/art/artistalbum"

[[platforms.targets]]
kind = "template"
value = "%MACOS_CACHE_HOME%/org.videolan.vlc/crashdump"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit VLC cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets VLC artwork cache and crash diagnostic leaves only; VLC MRU fields, playlist history, media files, and configuration are excluded."
