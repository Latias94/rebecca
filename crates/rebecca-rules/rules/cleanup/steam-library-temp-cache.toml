manifest_version = 1
id = "steam-library-temp-cache"
category = "application"
name = "Steam library temp cache"
safety_level = "moderate"
restore_hint = "Steam temporary staging data will be recreated if needed."
warnings = ["source-boundary"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "steam-library-template"
value = "steamapps\\temp"

[[platforms]]
platform = "macos"

[[platforms.targets]]
kind = "steam-library-template"
value = "steamapps/temp"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on the Steam library layout next to common game installs. The rule targets only the temporary staging directory and intentionally avoids common game content, workshop data, and account metadata."
