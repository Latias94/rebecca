manifest_version = 1
id = "postman-cache"
category = "application"
name = "Postman cache"
safety_level = "safe"
restore_hint = "Postman caches will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Postman\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Postman\\Code Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\Postman\\GPUCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Postman/Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Postman/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%XDG_CONFIG_HOME%/Postman/GPUCache"

[[platforms.targets]]
kind = "template"
value = "%HOME%/.var/app/com.getpostman.Postman/cache"

[[platforms.targets]]
kind = "template"
value = "%HOME%/snap/postman/common/.cache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Postman/Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Postman/Code Cache"

[[platforms.targets]]
kind = "template"
value = "%MACOS_APPLICATION_SUPPORT_HOME%/Postman/GPUCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Based on Postman's Windows Roaming app data layout and common Electron cache directory conventions, with null-e's Electron app list used as behavior-only reference. The rule targets cache subdirectories only and intentionally avoids Local Storage, IndexedDB, Service Worker, cookies, settings, workspace data, and session data."
