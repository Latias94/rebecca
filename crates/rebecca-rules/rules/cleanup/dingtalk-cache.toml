manifest_version = 1
id = "dingtalk-cache"
category = "application"
name = "DingTalk cache"
safety_level = "safe"
restore_hint = "DingTalk caches will be rebuilt on launch."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\DingTalk*\\Cache"

[[platforms.targets]]
kind = "template"
value = "%APPDATA%\\DingTalk\\Cache"

[[platforms.targets]]
kind = "glob-template"
value = "%APPDATA%\\DingTalk\\*\\resource_cache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against Mole DingTalk behavior as behavior reference only, no rule data copied, plus independent public Windows DingTalk cache-path observations. Cache leaves only; intentionally avoids account data, sync data, logs, document data, and session data."
