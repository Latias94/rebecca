manifest_version = 1
id = "wps-cache"
category = "application"
name = "WPS cache"
safety_level = "safe"
restore_hint = "WPS caches will be rebuilt when needed."
warnings = ["broad-discovery"]

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Kingsoft\\*\\cache\\http*"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Kingsoft\\WPS Cloud Files\\userdata\\*\\filecache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Kingsoft\\WPS Cloud Files\\UserData\\Default\\WebCache\\http*"

[provenance]
source = "owned"
license = "project-owned"
notes = "Uses Winapp2 Kingsoft Office entry as discovery index only, no rule data copied, plus independent public WPS Cloud Files cache-path observations. Cache leaves only; intentionally avoids document state, sync state, cookies, and account data."
