manifest_version = 1
id = "uv-cache"
category = "development"
name = "uv cache"
safety_level = "moderate"
restore_hint = "uv may need to redownload and rebuild packages."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "template"
value = "%LOCALAPPDATA%\\uv\\cache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Targets uv's documented Windows cache directory under Local AppData only, avoiding tools and project environments."
