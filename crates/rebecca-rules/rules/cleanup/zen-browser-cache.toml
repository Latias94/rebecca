manifest_version = 1
id = "zen-browser-cache"
category = "browser"
name = "Zen Browser cache"
safety_level = "safe"
restore_hint = "Zen Browser profile caches will be regenerated."

[[platforms]]
platform = "windows"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Zen\\Profiles\\*\\cache2"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Zen\\Profiles\\*\\startupCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Zen\\Profiles\\*\\jumpListCache"

[[platforms.targets]]
kind = "glob-template"
value = "%LOCALAPPDATA%\\Zen\\Profiles\\*\\OfflineCache"

[[platforms]]
platform = "linux"
warnings = ["active-process"]

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/zen/*/cache2"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/zen/*/startupCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/zen/*/jumpListCache"

[[platforms.targets]]
kind = "glob-template"
value = "%XDG_CACHE_HOME%/zen/*/OfflineCache"

[[platforms]]
platform = "macos"
warnings = ["active-process"]

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_CACHE_HOME%/Zen/Profiles/*/cache2"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_CACHE_HOME%/Zen/Profiles/*/startupCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_CACHE_HOME%/Zen/Profiles/*/jumpListCache"

[[platforms.targets]]
kind = "glob-template"
value = "%MACOS_CACHE_HOME%/Zen/Profiles/*/OfflineCache"

[provenance]
source = "owned"
license = "project-owned"
notes = "Cross-checked against BleachBit zen cleaner behavior as behavior reference only, no rule data copied. Rebecca independently targets only Gecko profile cache leaves and intentionally excludes cookies, history, passwords, session restore, site data, site preferences, bookmark backups, crash reports, and profile configuration."
